## Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:

  postgres:
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c max_connections=30
      -c wal_buffers=2MB
      -c checkpoint_completion_target=0.7
      -c random_page_cost=1.1
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      bagetter:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bagetter:
    ports: []   # Remove host port binding — Caddy reaches bagetter via Docker network
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      TrustedProxies__0: "172.29.0.0/16"
      AllowedCorsOrigins__0: "https://packages.dev.coderise.fr"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  caddy-data:
  caddy-config:

networks:
  default:
    ipam:
      config:
        - subnet: 172.29.0.0/16
